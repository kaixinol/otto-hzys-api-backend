    <script type="application/ld+json">

        "name": "电棍otto语音活字印刷生成",
        "url": "https://otto-hzys-api-backend.vercel.app/",
        "description": "电棍otto语音活字印刷生成，支持文本转 WAV、页内播放器试听、可选密钥认证与字数限制提示。",
        "applicationCategory": "MultimediaApplication",

    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --panel: rgba(255, 251, 245, 0.92);
        --text: #1e1a17;
        --muted: #6d6259;
        --accent: #b24a2a;
        --accent-dark: #8f3b22;
        --border: rgba(73, 49, 35, 0.14);
        --danger: #b42318;
        --success: #156f3b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 196, 137, 0.55), transparent 30%),
          radial-gradient(circle at right center, rgba(178, 74, 42, 0.16), transparent 24%),
          linear-gradient(180deg, #f7f0e6 0%, #efe5d8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 760px);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(58, 36, 24, 0.14);
        overflow: hidden;
      }

      .hero {
        padding: 28px 28px 16px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.05;
      }

      .subtitle {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        padding: 12px 28px 28px;
      }

      .field {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      textarea,
      input[type="password"] {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
        color: inherit;
        background: rgba(255, 255, 255, 0.86);
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .option {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.75);
      }

      .option input {
        margin-top: 3px;
      }

      .option strong {
        display: block;
        font-size: 14px;
      }

      .option span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 13px 20px;
        font: inherit;
        font-weight: 700;
        color: #fff8f2;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      .hint,
      .status {
        font-size: 14px;
        line-height: 1.6;
      }

      .hint {
        color: var(--muted);
      }

      .status {
        min-height: 24px;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--success);
      }

      .player {
        margin-top: 18px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.7);
      }

      .player[hidden] {
        display: none;
      }

      audio {
        width: 100%;
      }

      @media (max-width: 640px) {
        body {
          padding: 12px;
        }

        .hero,
        form {
          padding-left: 18px;
          padding-right: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="hero">
        <p class="eyebrow">OTTO HZYS</p>
        <h1>电棍otto语音活字印刷生成</h1>
        <p class="subtitle">
          电棍otto语音活字印刷生成工具。在 Vercel 根路径直接调用后端接口，自动显示当前字数上限，并在填写密钥时附带 Bearer 认证头。
        </p>
      </section>

      <form id="otto-form">
        <div class="field">
          <label for="text">文本内容</label>
          <textarea id="text" name="text" placeholder="输入要转换的内容" required></textarea>
          <div class="meta">
            <span id="limit-text">当前上限读取中...</span>
            <span id="count-text">0</span>
          </div>
        </div>

        <div class="options">
          <label class="option" for="isYsdd">
            <input id="isYsdd" name="isYsdd" type="checkbox" checked />
            <span>
              <strong>启用原声片段</strong>
              <span>保留既有默认行为。</span>
            </span>
          </label>

          <label class="option" for="useNonDdbPinyin">
            <input id="useNonDdbPinyin" name="useNonDdbPinyin" type="checkbox" checked />
            <span>
              <strong>使用非电棍拼音</strong>
              <span>允许从额外子目录随机取样。</span>
            </span>
          </label>

          <label class="option" for="isSliced">
            <input id="isSliced" name="isSliced" type="checkbox" />
            <span>
              <strong>分段模式</strong>
              <span>按后端现有逻辑处理文本切片。</span>
            </span>
          </label>
        </div>

        <div class="field">
          <label for="apiKey">API Key</label>
          <input id="apiKey" name="apiKey" type="password" autocomplete="new-password" placeholder="未启用认证时可留空" />
          <div class="meta">
            <span id="auth-text">认证状态读取中...</span>
          </div>
        </div>

        <div class="actions">
          <button id="submit-btn" type="submit">生成播放器音频</button>
          <span class="hint">接口：`POST /api/text-to-wav`</span>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
        <div id="player-panel" class="player" hidden>
          <audio id="audio-player" controls preload="metadata"></audio>
        </div>
      </form>
    </main>

    <script>
      const form = document.getElementById('otto-form');
      const textInput = document.getElementById('text');
      const apiKeyInput = document.getElementById('apiKey');
      const countText = document.getElementById('count-text');
      const limitText = document.getElementById('limit-text');
      const authText = document.getElementById('auth-text');
      const statusText = document.getElementById('status');
      const submitButton = document.getElementById('submit-btn');
      const playerPanel = document.getElementById('player-panel');
      const audioPlayer = document.getElementById('audio-player');

      let maxTextLength = 1000;
      let authEnabled = false;
      let audioObjectUrl = null;

      function setStatus(message, type) {
        statusText.textContent = message;
        statusText.className = type ? `status ${type}` : 'status';
      }

      function updateCounter() {
        countText.textContent = `${textInput.value.length}/${maxTextLength}`;
      }

      async function loadRuntimeConfig() {
        try {
          const response = await fetch('/health');
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          if (typeof data.maxTextLength === 'number' && data.maxTextLength > 0) {
            maxTextLength = data.maxTextLength;
          }
          authEnabled = Boolean(data.authEnabled);
          limitText.textContent = `当前上限：${maxTextLength} 个字符`;
          authText.textContent = authEnabled
            ? '服务端已启用 Bearer 认证，请填写 API Key。'
            : '服务端未启用认证，API Key 可留空。';
          updateCounter();
        } catch (error) {
          limitText.textContent = `当前上限：${maxTextLength} 个字符（默认值）`;
          authText.textContent = '无法读取运行时配置，将按未启用认证的默认状态显示。';
        }
      }

      textInput.addEventListener('input', updateCounter);

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const text = textInput.value;

        if (!text.trim()) {
          setStatus('请输入文本内容。', 'error');
          return;
        }

        if (text.length > maxTextLength) {
          setStatus(`文本超过上限，当前最多 ${maxTextLength} 个字符。`, 'error');
          return;
        }

        submitButton.disabled = true;
        setStatus('生成中，请稍候...', '');

        try {
          const headers = {
            'Content-Type': 'application/json'
          };

          const apiKey = apiKeyInput.value.trim();
          if (apiKey) {
            headers.Authorization = `Bearer ${apiKey}`;
          }

          const response = await fetch('/api/text-to-wav', {
            method: 'POST',
            headers,
            body: JSON.stringify({
              text,
              isYsdd: document.getElementById('isYsdd').checked,
              useNonDdbPinyin: document.getElementById('useNonDdbPinyin').checked,
              isSliced: document.getElementById('isSliced').checked
            })
          });

          if (!response.ok) {
            let message = `请求失败：HTTP ${response.status}`;
            try {
              const payload = await response.json();
              message = payload.message || payload.error || message;
            } catch (error) {
            }
            throw new Error(message);
          }

          const blob = await response.blob();
          if (audioObjectUrl) {
            URL.revokeObjectURL(audioObjectUrl);
          }
          audioObjectUrl = URL.createObjectURL(blob);
          audioPlayer.src = audioObjectUrl;
          playerPanel.hidden = false;
          await audioPlayer.play().catch(() => {});
          setStatus('生成成功，可以直接在页面里播放。', 'success');
        } catch (error) {
          setStatus(error.message || '生成失败，请稍后再试。', 'error');
        } finally {
          submitButton.disabled = false;
        }
      });

      updateCounter();
      loadRuntimeConfig();
    </script>
  </body>
</html>
